name: Build and publish Docker image
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"
  #    - main
  #pull_request:
  #  branches:
  #    - main
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Extract version from tag
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USER }}" --password-stdin
      - name: Build and push Docker image
        run: |
          docker build ./journal_app/ -t ${{ secrets.DOCKER_HUB_USER }}/journal-app:0.0.3
          docker build ./journal_app/ -t ${{ secrets.DOCKER_HUB_USER }}/journal-app:latest
      - name: push docker image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USER }}/journal-app:0.0.3
          docker push ${{ secrets.DOCKER_HUB_USER }}/journal-app:latest
