name: Build and publish Docker image
on:
  workflow_dispatch:
  #push:
  #  branches:
  #    - main
  #pull_request:
  #  branches:
  #    - main
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_HUB_USER }} -p ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        run: docker build ./journal_app/ -t ${{ secrets.DOCKER_HUB_USER }}/journal_app/journal:latest
      - name: push docker image
        run: docker push ${{ secrets.DOCKER_HUB_USER }}/journal_app/journal:latest
