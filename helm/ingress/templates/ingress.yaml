apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  rules:
    - host: {{ .Values.rules.host }}
      http:
        paths:
          - path: {{ .Values.rules.path }}
            pathType: {{ .Values.rules.pathType }}
            backend:
              service:
               name: {{ .Values.rules.serviceName }}
               port:
                 number: {{ .Values.rules.port }}